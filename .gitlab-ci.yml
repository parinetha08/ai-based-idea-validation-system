stages:
  - lint
  - format
  - type_check
  - test
  - coverage

lint:
  stage: lint
  tags:
    - windows
  script:
    - ruff check app tests
    - semgrep scan .

format:
  stage: format
  tags:
    - windows
  script:
    - ruff format --check app tests

type_check:
  stage: type_check
  tags:
    - windows
  script:
    - mypy app

test:
  stage: test
  tags:
    - windows
  script:
    - pytest tests -v
    - pip-audit -r requirements.txt

coverage:
  stage: coverage
  tags:
    - windows
  script:
    - pytest --cov=app --cov-report=xml